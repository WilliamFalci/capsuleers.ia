# Cross-platform build and publishing to GitHub Releases.
# Triggered by a version tag (e.g. `v0.1.0`) or manually (workflow_dispatch).
# NATIVE build per OS: node-llama-cpp has per-platform binaries, so Linux runs
# on ubuntu and Windows on windows. The publish owner/repo are injected
# from the Actions environment (the placeholder in electron-builder.yml is overridden).
name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write          # needed by electron-builder to create/update the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Two Windows variants: NVIDIA/CUDA and AMD/Vulkan. Each uses its own
        # electron-builder config (different bundled @node-llama-cpp binaries,
        # different installer name, different update channel). `npm ci` on the
        # windows runner installs both win-x64-cuda(+ext) and win-x64-vulkan, so
        # each config just picks what to bundle via its `files` list.
        include:
          - os: ubuntu-latest
            label: linux
            args: --linux
          - os: windows-latest
            label: windows-cuda
            args: --win --config electron-builder.win-cuda.yml
          - os: windows-latest
            label: windows-vulkan
            args: --win --config electron-builder.win-vulkan.yml
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      # Install the dependencies (node-llama-cpp's postinstall downloads the
      # native binaries for the runner's platform).
      - run: npm ci

      # Build the installer + publish to the current tag's release. owner/repo
      # come from electron-builder.yml (publish:). Avoid the -c.publish.* CLI
      # dot-notation: it breaks under PowerShell on the Windows runners.
      - name: Build & publish
        run: npx --no-install electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Backup copy of the artifacts, also useful for workflow_dispatch. The name must be
      # unique per matrix entry (the two windows variants would otherwise collide).
      - uses: actions/upload-artifact@v4
        with:
          name: capsuleers-ia-${{ matrix.label }}
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.exe
            desktop/dist/latest*.yml
          if-no-files-found: ignore
